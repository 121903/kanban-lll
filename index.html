.sync-idle{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.sync-saving{background:rgba(251,191,36,.25);color:#FCD34D}

.dot-pulse{animation:pulse 1.2s infinite}

.tb{background:#fff;padding:10px 22px;display:flex;flex-wrap:wrap;gap:9px;align-items:center;border-bottom:1px solid #e2e0d8}
.srch{flex:1;min-width:180px;padding:8px 11px;border:1px solid #ccc;border-radius:8px;font-size:13px;outline:none;background:#f9f8f5}

.sel{padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:13px;background:#f9f8f5;color:#333;outline:none}

.sp{background:#f5f4f0;border:1px solid #e2e0d8;border-radius:7px;padding:4px 12px;font-size:12px;white-space:nowrap}

.board{padding:16px 22px 40px;display:flex;gap:13px;overflow-x:auto;min-height:calc(100vh - 190px);align-items:flex-start}

.col-head{padding:10px 13px;display:flex;justify-content:space-between;align-items:center}
.col-label{color:#fff;font-size:12px;font-weight:700}
.col-cnt{background:rgba(255,255,255,.26);border-radius:20px;padding:1px 9px;font-size:11px;color:#fff;font-weight:700}
.col-body{flex:1;padding:7px;min-height:280px;transition:background .1s}
.card{background:#fff;border:1px solid #e5e3da;border-radius:9px;padding:9px 10px;margin-bottom:7px;cursor:grab;transition:box-shadow .1s,border-color .12s}

.vbadge{background:#FEECEC;color:#C0392B;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.ubadge{background:#FEF0E0;color:#D35400;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}

function loadLocal(){try{const v=localStorage.getItem(KEY);return v?JSON.parse(v):seed();}catch{return seed();}}

/* ── DATE ROW ── */
function DateRow({icon,label,date,fatal}){
  if(!date)return null;
  const t=tod(),t3=in3();
  const venc=date<t,urg=!venc&&date<=t3;
  const color=fatal?'#FF6200':venc?'#C0392B':urg?'#D35400':'#777';
  return(
    <div className="date-row" style={{color,textShadow:fatal?'0 0 8px rgba(255,98,0,.35)':'none',fontSize:fatal?'12px':'11px'}}>
      <span>{icon}</span><span>{label}: <strong>{date}</strong></span>
      {venc&&<span className="vbadge">VENCIDO</span>}
      {urg&&!venc&&<span className="ubadge">URGENTE</span>}
    </div>
  );
}

/* ── CARD MODAL ── */
function CardModal({modal,setModal,cards,persist}){
  const isAdd=modal.t==='add';
  const col=COLS.find(c=>c.id===modal.col);
  const isAg=modal.col==='aguardando';
  const [f,setF]=useState(isAdd?{...BLANK}:{...BLANK,...modal.card});
  const cf=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const save=()=>{
    if(!f.title.trim())return;
    const nc={...cards};
    if(isAdd)nc[modal.col]=[...nc[modal.col],{...f,id:mk(),createdAt:ts()}];
    else nc[modal.col]=nc[modal.col].map(c=>c.id===modal.card.id?{...c,...f}:c);
    persist(nc);setModal(null);
  };
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
      <div className="modal">
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:2}}>
          <div style={{width:11,height:11,borderRadius:'50%',background:col?.color,flexShrink:0}}></div>
          <p className="modal-title">{isAdd?'Novo Card':'Editar Card'}</p>
        </div>
        <p className="modal-sub">{col?.label}</p>
        <p className="slbl">Identificação</p>
        <label className="lbl" style={{marginTop:0}}>Título *</label>
        <input className="inp" value={f.title} onChange={cf('title')} placeholder="Ex: Petição inicial – Caso X"/>

/* ── APPS SCRIPT CODE ── */
const SCRIPT_CODE=`// ══════════════════════════════════════════════════
// KANBAN — Lopes de Lima Advogados  (versão colaborativa)
// Cole este código em script.google.com
// ══════════════════════════════════════════════════

const ARQUIVO = 'kanban-lopes-lima.json';
const PASTA   = 'Kanban LLL';

// ── GET: test, calendar, load, check ─────────────
function doGet(e) {
  const acao = e.parameter.action || '';
  try {
    if (acao === 'test')     return ok({ status: 'ok', msg: 'Conectado com sucesso!' });
    if (acao === 'calendar') return ok(getAgenda());
    if (acao === 'load')     return ok(carregar());
    if (acao === 'check')    return ok(checar());
    return ok({ erro: 'Acao desconhecida: ' + acao });
  } catch(err) {
    return ok({ erro: err.message });
  }
}

// ── POST: save ───────────────────────────────────
function doPost(e) {
  try {
    const body = JSON.parse(e.postData.contents);
    if (body.action === 'save') return ok(salvar(body.data));
    return ok({ erro: 'Acao desconhecida' });
  } catch(err) {
    return ok({ erro: err.message });
  }
}

function ok(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

// ── Google Agenda ────────────────────────────────
function getAgenda() {
  const agora  = new Date();
  const futuro = new Date(agora.getTime() + 14 * 86400000);
  const tz     = Session.getScriptTimeZone();
  return CalendarApp.getDefaultCalendar()
    .getEvents(agora, futuro)
    .map(function(ev) {
      return {
        title:       ev.getTitle(),
        date:        Utilities.formatDate(ev.getStartTime(), tz, 'yyyy-MM-dd'),
        description: ev.getDescription() || ''
      };
    });
}

// ── Drive ────────────────────────────────────────
function getPasta() {
  const pastas = DriveApp.getFoldersByName(PASTA);
  return pastas.hasNext() ? pastas.next() : DriveApp.createFolder(PASTA);
}

function salvar(dados) {
  const pasta    = getPasta();
  const arquivos = pasta.getFilesByName(ARQUIVO);
  const conteudo = JSON.stringify(dados, null, 2);
  if (arquivos.hasNext()) {
    arquivos.next().setContent(conteudo);
  } else {
    pasta.createFile(ARQUIVO, conteudo, 'application/json');
  }
  return { ok: true, savedAt: new Date().toISOString() };
}

function carregar() {
  const pasta    = getPasta();
  const arquivos = pasta.getFilesByName(ARQUIVO);
  if (!arquivos.hasNext()) return { ok: false, data: null };
  const arquivo  = arquivos.next();
  return {
    ok: true,
    data: JSON.parse(arquivo.getBlob().getDataAsString()),
    updatedAt: arquivo.getLastUpdated().toISOString()
  };
}

function checar() {
  const pasta    = getPasta();
  const arquivos = pasta.getFilesByName(ARQUIVO);
  if (!arquivos.hasNext()) return { ok: false };
  return { ok: true, updatedAt: arquivos.next().getLastUpdated().toISOString() };
}`;

/* ── SYNC PILL ── */
function SyncPill({state,lastSync}){
  const map={
    idle:{cls:'sync-idle',dot:false,label:'Google Drive'},
    saving:{cls:'sync-saving',dot:true,label:'Salvando…'},
    saved:{cls:'sync-ok',dot:false,label:'Salvo ✓'},
    loading:{cls:'sync-loading',dot:true,label:'Atualizando…'},
    updated:{cls:'sync-ok',dot:false,label:'Atualizado ✓'},
    error:{cls:'sync-err',dot:false,label:'Erro de sync'},
    nocfg:{cls:'sync-idle',dot:false,label:'Drive não configurado'},
  };
  const s=map[state]||map.idle;
  return(
    <div className={`sync-pill ${s.cls}`}>
      <div className={`dot${s.dot?' dot-pulse':''}`}/>
      <span>{s.label}</span>
      {lastSync&&!s.dot&&<span style={{opacity:.6,fontSize:10}}>· {lastSync}</span>}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [cards,setCards]=useState(loadLocal);
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState('');
  const [priF,setPriF]=useState('');
  const [respF,setRespF]=useState('');
  const [msg,setMsg]=useState(null);
  const [drag,setDrag]=useState(null);
  const [over,setOver]=useState(null);
  const [scriptUrl,setScriptUrl]=useState(()=>localStorage.getItem(SCRKEY)||'');
  const [showCfg,setShowCfg]=useState(false);
  const [syncState,setSyncState]=useState('nocfg');
  const [lastSync,setLastSync]=useState('');

  // Refs to avoid stale closures
  const cardsRef=useRef(cards);
  const scriptUrlRef=useRef(scriptUrl);
  const saveTimerRef=useRef(null);
  const pollTimerRef=useRef(null);
  const lastSavedAtRef=useRef(null); // ISO string of last save timestamp
  const isSeedRef=useRef(false); // true = first load, don't auto-save

  useEffect(()=>{cardsRef.current=cards;},[cards]);
  useEffect(()=>{scriptUrlRef.current=scriptUrl;},[scriptUrl]);
  useEffect(()=>{setSyncState(scriptUrl?'idle':'nocfg');},[scriptUrl]);

  const flash=(txt,t='ok')=>{setMsg({txt,t});setTimeout(()=>setMsg(null),5000);};

  /* ── GAS CALLS ── */
  const gasGet=useCallback(async(action)=>{
    const r=await fetch(`${scriptUrlRef.current}?action=${action}`,{redirect:'follow'});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    return JSON.parse(await r.text());
  },[]);

  const gasPost=useCallback(async(action,data)=>{
    await fetch(scriptUrlRef.current,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=UTF-8'},
      body:JSON.stringify({action,data}),
      redirect:'follow'
    });
  },[]);

  /* ── SAVE TO DRIVE ── */
  const saveToDrive=useCallback(async(data)=>{
    if(!scriptUrlRef.current)return;
    setSyncState('saving');
    try{
      await gasPost('save',data);
      lastSavedAtRef.current=new Date().toISOString();
      const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setLastSync(t);setSyncState('saved');
      setTimeout(()=>setSyncState('idle'),3000);
    }catch(e){setSyncState('error');}
  },[gasPost]);

  /* ── PERSIST: save locally + schedule Drive save ── */
  const persist=useCallback((nc,skipDrive=false)=>{
    setCards(nc);
    try{localStorage.setItem(KEY,JSON.stringify(nc));}catch{}
    if(skipDrive||!scriptUrlRef.current)return;
    // Debounce Drive save
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>saveToDrive(nc),SAVE_DEBOUNCE);
  },[saveToDrive]);

  /* ── POLL: load from Drive every 30s ── */
  const pollDrive=useCallback(async()=>{
    if(!scriptUrlRef.current)return;
    try{
      const res=await gasGet('check');
      if(!res?.ok||!res.updatedAt)return;
      // Only load if Drive file is newer than our last save
      const driveTime=new Date(res.updatedAt).getTime();
      const ourTime=lastSavedAtRef.current?new Date(lastSavedAtRef.current).getTime():0;
      if(driveTime<=ourTime)return; // we have the latest
      // Drive is newer — load it
      setSyncState('loading');
      const loaded=await gasGet('load');
      if(loaded?.ok&&loaded.data){
        const nc=loaded.data;
        setCards(nc);
        try{localStorage.setItem(KEY,JSON.stringify(nc));}catch{}
        lastSavedAtRef.current=res.updatedAt;
        const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        setLastSync(t);setSyncState('updated');
        setTimeout(()=>setSyncState('idle'),3000);
      }
    }catch{}
  },[gasGet]);

  /* ── Initial load from Drive ── */
  useEffect(()=>{
    if(!scriptUrl)return;
    (async()=>{
      try{
        setSyncState('loading');
        const res=await gasGet('load');
        if(res?.ok&&res.data){
          setCards(res.data);
          try{localStorage.setItem(KEY,JSON.stringify(res.data));}catch{}
          lastSavedAtRef.current=res.updatedAt||new Date().toISOString();
          const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
          setLastSync(t);setSyncState('updated');
          setTimeout(()=>setSyncState('idle'),3000);
        }else{setSyncState('idle');}
      }catch{setSyncState('idle');}
    })();
  // eslint-disable-next-line
  },[scriptUrl]);

  /* ── Start polling ── */
  useEffect(()=>{
    if(!scriptUrl)return;
    pollTimerRef.current=setInterval(pollDrive,POLL_INTERVAL);
    return()=>clearInterval(pollTimerRef.current);
  },[scriptUrl,pollDrive]);

  /* ── Calendar sync ── */
  const syncCalendar=async()=>{
    if(!scriptUrl){setShowCfg(true);return;}
    flash('Buscando eventos da agenda…','info');
    try{
      const events=await gasGet('calendar');
      if(!Array.isArray(events))throw new Error(events?.erro||'Resposta inválida');
      let added=0;
      const nc={...cardsRef.current};
      events.forEach(ev=>{
        const dup=(nc.prazo||[]).some(c=>c.title===ev.title&&c.deadline===ev.date);
        if(!dup&&ev.title){
          nc.prazo=[...(nc.prazo||[]),{
            id:'gc-'+mk(),title:ev.title,client:'Google Agenda',processo:'',instancia:'',
            responsavel:'Bruno Lima (OAB/DF)',tipoRecurso:'',description:ev.description||'',
            deadline:ev.date,conclusaoDeadline:'',fatalDeadline:ev.date,waitDeadline:'',
            priority:'alta',createdAt:ts()
          }];added++;
        }
      });
      persist(nc);
      flash(added>0?`${added} evento(s) importado(s) para Prazo / Urgente!`:`Agenda verificada — ${events.length} evento(s) encontrado(s).`);
    }catch(e){flash('Erro: '+e.message,'err');}
  };

  const moveCard=(col,id,to)=>{
    if(col===to)return;
    const card=cards[col].find(c=>c.id===id);
    if(!card)return;
    persist({...cards,[col]:cards[col].filter(c=>c.id!==id),[to]:[...cards[to],{...card}]});
  };
  const delCard=()=>{persist({...cards,[modal.col]:cards[modal.col].filter(c=>c.id!==modal.card.id)});setModal(null);};

  const shown=useMemo(()=>{
    const q=search.toLowerCase();
    const out={};
    COLS.forEach(({id})=>{
      out[id]=(cards[id]||[]).filter(c=>{
        const sm=!q||[c.title,c.client,c.processo,c.responsavel].some(x=>(x||'').toLowerCase().includes(q));
        return sm&&(!priF||c.priority===priF)&&(!respF||c.responsavel===respF);
      });
    });
    return out;
  },[cards,search,priF,respF]);

  const t=tod(),t3=in3();
  const total=Object.values(cards).reduce((s,l)=>s+l.length,0);
  const urgentes=Object.values(cards).reduce((s,l)=>s+l.filter(c=>(c.fatalDeadline||c.deadline)&&(c.fatalDeadline||c.deadline)>=t&&(c.fatalDeadline||c.deadline)<=t3).length,0);
  const vencidos=Object.values(cards).reduce((s,l)=>s+l.filter(c=>(c.fatalDeadline||c.deadline)&&(c.fatalDeadline||c.deadline)<t).length,0);
  const allResps=[...new Set(Object.values(cards).flat().map(c=>c.responsavel).filter(Boolean))];
  const dfmt=()=>new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  return(
    <div>
      {/* HEADER */}
      <div className="hd">
        <div>
          <div className="hd-title">Lopes de Lima Advogados</div>
          <div className="hd-sub">OAB/DF · Controle Interno — Kanban</div>
        </div>
        <div className="hd-right">
          <span style={{color:'rgba(255,255,255,.45)',fontSize:11}}>{dfmt()}</span>
          <SyncPill state={syncState} lastSync={lastSync}/>
          <button className="btn-cfg" onClick={()=>setShowCfg(true)}>⚙ Google</button>
        </div>
      </div>

      {/* COLLAB BANNER */}
      {scriptUrl&&(
        <div className="collab-banner">
          <span>🔄</span>
          <span>Modo colaborativo — salva automaticamente após cada alteração · atualiza a cada 30 segundos · compartilhe o link com sua equipe</span>
        </div>
      )}

      {/* TOOLBAR */}
      <div className="tb">
        <input className="srch" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por título, cliente, processo ou responsável…"/>
        <select className="sel" value={priF} onChange={e=>setPriF(e.target.value)}>
          <option value=''>Todas as prioridades</option>{PRI.map(p=><option key={p.v} value={p.v}>{p.lbl}</option>)}
        </select>
        <select className="sel" value={respF} onChange={e=>setRespF(e.target.value)}>
          <option value=''>Todos os responsáveis</option>{allResps.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <button className="btn btn-g" onClick={syncCalendar}
          style={{padding:'8px 15px',border:'none',borderRadius:8,fontSize:12,cursor:'pointer',fontWeight:700,background:'#0F9D58',color:'#fff'}}>
          📅 Sincronizar Agenda
        </button>
        {msg&&<span className={`msg msg-${msg.t}`}>{msg.txt}</span>}
      </div>

      {/* STATS */}
      <div className="st">
        {[[total,'Total','#185FA5'],[urgentes,'Urgentes (3 dias)','#FF6200'],[vencidos,'Vencidos','#C0392B'],
          [(cards.aguardando||[]).length,'Aguardando Cliente','#4A42A8'],
          [(cards.pendencias||[]).length,'Pendências','#822250'],
          [(cards.concluido||[]).length,'Concluídos','#306010'],
        ].map(([n,l,c])=>(
          <div key={l} className="sp"><span style={{fontWeight:700,color:c,marginRight:4}}>{n}</span><span style={{color:'#666'}}>{l}</span></div>
        ))}
      </div>

      {/* BOARD */}
      <div className="board">
        {COLS.map(col=>{
          const list=shown[col.id]||[];
          const isAg=col.id==='aguardando';
          const isReu=col.id==='reunioes'||col.id==='audiencias';
          return(
            <div key={col.id} className="col">
              <div className="col-head" style={{background:col.color}}>

                {list.map(card=>{

                  return(
                    <div key={card.id} className="card" draggable
                      onDragStart={e=>{setDrag({id:card.id,col:col.id});e.dataTransfer.effectAllowed='move';}}
                      style={{borderLeft:`3px solid ${col.color}`}}>
                      <div className="card-header">
                        <span className="card-title">{card.title}</span>
                        <span className={pri.cls}>{pri.lbl}</span>
                      </div>
                      <div className="card-meta">
                        {card.client&&<span className="tag">{card.client}</span>}
                        {card.processo&&<span className="tag tag-proc">{card.processo}</span>}
                        {card.instancia&&<span className="tag tag-inst">{card.instancia}</span>}
                        {card.responsavel&&<span className="tag tag-resp">{card.responsavel}</span>}
                        {card.tipoRecurso&&<span className="tag tag-tipo">{card.tipoRecurso}</span>}
                      </div>
                      {card.description&&<div className="card-desc">{card.description.slice(0,85)}{card.description.length>85?'…':''}</div>}
                      <div className="card-dates">
                        <DateRow icon="📅" label="Prazo" date={card.deadline}/>
                        <DateRow icon="✅" label="Conclusão" date={card.conclusaoDeadline}/>
                        <DateRow icon="⚡" label="Prazo Fatal" date={card.fatalDeadline} fatal/>
                        {isAg&&<DateRow icon="⏳" label="Aguardar até" date={card.waitDeadline}/>}
                        {isReu&&card.deadline&&<DateRow icon="🗓" label="Data" date={card.deadline}/>}
                      </div>
                      <div className="card-foot">
                        <select className="mv-sel" onChange={e=>{if(e.target.value){moveCard(col.id,card.id,e.target.value);e.target.value='';}}} value="">
                          <option value="" disabled>Mover para…</option>
                          {COLS.filter(c=>c.id!==col.id).map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                        </select>
                        <button className="ic-btn" onClick={()=>setModal({t:'edit',col:col.id,card})}>Editar</button>
                        <button className="ic-btn ic-del" onClick={()=>setModal({t:'confirm',col:col.id,card})}>Excluir</button>
                      </div>
                    </div>
                  );
                })}
                <button className="add-btn" onClick={()=>setModal({t:'add',col:col.id})}>+ Adicionar card</button>
              </div>
            </div>
          );
        })}
      </div>

      {(modal?.t==='add'||modal?.t==='edit')&&<CardModal modal={modal} setModal={setModal} cards={cards} persist={persist}/>}
      {modal?.t==='confirm'&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
          <div className="modal" style={{maxWidth:360}}>
            <p className="modal-title" style={{marginBottom:8}}>Excluir card?</p>
            <p style={{fontSize:13,color:'#555',marginBottom:5}}><b>{modal.card?.title}</b></p>
            <p style={{fontSize:13,color:'#888',marginBottom:18}}>Esta ação não poderá ser desfeita.</p>
            <div className="modal-foot">
              <button className="btn btn-cancel" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-danger" onClick={delCard}>Excluir</button>
            </div>
          </div>
        </div>
      )}
      {showCfg&&<SettingsModal url={scriptUrl} setUrl={u=>{setScriptUrl(u);localStorage.setItem(SCRKEY,u);}} onClose={()=>setShowCfg(false)} syncStatus={syncState}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
